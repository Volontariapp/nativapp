name: CI Mobile (Expo)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Type Check
        run: yarn ts:check

      - name: Expo Setup
        run: |
          yarn dlx eas-cli --version
          yarn expo install --check

      - name: Preview Build (Prebuild Check)
        run: npx expo prebuild --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build Dry Run
        run: |
          echo "Verifying EAS configuration..."
          npx expo config --type public
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
